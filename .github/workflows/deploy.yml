name: Deploy to Cloudflare Pages

on:
  push:
    branches:
      - main

concurrency:
  group: pages-deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Bundle leak check (service_role key must not ship to client)
        run: |
          if grep -rE 'service_role|sb_secret_' dist/ 2>/dev/null; then
            echo "::error::Service-role key or secret pattern detected in client bundle. Refusing to deploy."
            exit 1
          fi
          echo "Bundle leak check passed."

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy ./dist --project-name=polygo --branch=main
