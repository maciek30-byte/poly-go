name: Deploy

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'context/**'
      - '.idea/**'

permissions:
  contents: read
  deployments: write

jobs:
  # Schemat bazy idzie na prod PRZED frontem — kod nigdy nie wyprzedza migracji.
  # Tylko migracje (schemat); seed danych jest świadomie ręczny (`pnpm deploy:db`
  # / dashboard), żeby nie nadpisywać prod danych przy każdym pushu.
  migrate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Push migrations to prod
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          supabase link --project-ref yaejbsodwhixywjpqhau
          supabase db push

  deploy:
    needs: migrate
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile
      - run: pnpm build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy ./dist --project-name=polygo --branch=main
